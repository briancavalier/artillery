name: Spec Architecture

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: spec-architecture-main
  cancel-in-progress: false

jobs:
  architect:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      checks: read
      statuses: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Policy checks
        run: npm run policy:check
      - name: Run spec architecture controller
        env:
          FACTORY_EVENT_MODE: local
          FACTORY_STATE_PATH: var/factory/state.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-codex' }}
          OPENAI_REQUEST_TIMEOUT_MS: 120000
          OPENAI_REQUEST_MAX_ATTEMPTS: 4
          OPENAI_REQUEST_BACKOFF_MS: 1500
          DEPLOY_ID: run-${{ github.run_id }}-spec-architecture
          FACTORY_API_BASE_URL: ${{ vars.PROD_FACTORY_API_BASE_URL || vars.PRODUCTION_FACTORY_API_BASE_URL || vars.STAGING_FACTORY_API_BASE_URL }}
        run: npm run factory:spec-architecture
      - name: Refresh main after architecture merges
        run: |
          git pull --rebase --autostash origin main
      - name: Commit architecture updates
        run: |
          DIFF_PATHS=(specs reports/spec-architecture reports/architecture-context var/factory/state.json)
          if [ -d architecture ]; then
            DIFF_PATHS+=(architecture)
          fi
          if git diff --quiet -- "${DIFF_PATHS[@]}"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs reports/spec-architecture reports/architecture-context
          if [ -d architecture ]; then
            git add architecture
          fi
          git add -f var/factory/state.json
          git commit -m "chore(factory): record architecture worker state"
          git push
      - name: Trigger spec execution handoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f reports/spec-architecture/latest.json ]; then
            exit 0
          fi
          ADVANCED_COUNT="$(jq '(.advanced // []) | length' reports/spec-architecture/latest.json)"
          if [ "${ADVANCED_COUNT}" = "0" ]; then
            exit 0
          fi
          gh workflow run spec-execution.yml --ref main
      - name: Upload architecture manifest
        uses: actions/upload-artifact@v4
        with:
          name: spec-architecture-${{ github.run_id }}
          path: |
            reports/spec-architecture/latest.json
            reports/architecture-context/**
            architecture/**
            var/factory/state.json
      - name: Attest architecture manifest
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: reports/spec-architecture/latest.json
